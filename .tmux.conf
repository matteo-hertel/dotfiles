# Prefix
unbind C-b
set -g prefix `
bind ` send-prefix

# New window
unbind '"'
unbind %
bind s split-window -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Easy Config Reloads
bind r source-file ~/.tmux.conf

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key H resize-pane -L 5
bind-key L resize-pane -R 5

#mouse mode for panes
set -g mouse on

#misc
set -g set-titles on
set -g status-interval 1
set -s escape-time 0
set -s extended-keys on
set-option -g history-limit 250000
set-option -g focus-events on

# Stop with the annoying questions
bind-key x kill-pane
bind-key & kill-window

# Duck pond
bind d run-shell "tsp duck"

# Popup shell
bind h display-popup -w 80% -h 80% -E -e TMUX_POPUP=1


# --- Terminal capabilities (modern tmux 3.2+) ---
# Inner TERM: tmux-256color exposes italics/undercurl/etc to programs in panes.
set -g default-terminal "tmux-256color"
# Tell tmux that *every* outer terminal supports truecolor + OSC 52 clipboard,
# regardless of the outer TERM's declared capabilities. Works for Ghostty,
# iTerm2, Alacritty, Kitty, etc. without per-terminal whitelists.
set -as terminal-features ",*:RGB:clipboard"
# Forward tmux's copy buffer to the host terminal's clipboard via OSC 52, so
# mouse-drag selections + `y` in copy-mode actually land on the system clipboard.
set -s set-clipboard on


# colorsync theme (written by `colorsync apply`)
if-shell "test -f ~/.tmux/theme.conf" "source-file ~/.tmux/theme.conf"
